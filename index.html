<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Guide Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Fraunces:ital,wght@1,500;1,600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --paper: #F8F6FA;
    --ink: #322C42;
    --ink-soft: #756E87;
    --sage: #7C9473;
    --sage-dim: #E7EEE4;
    --navy: #2E4F6E;
    --line: #E4DFEC;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  .brand-mark { display: flex; align-items: baseline; gap: 7px; margin-bottom: 6px; }
  .brand-mark .mml { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.02rem; color: var(--sage); }
  .brand-mark .tagline { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); }

  h1 { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { color: var(--ink-soft); font-size: 0.92rem; margin: 0 0 24px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.82rem; font-weight: 700; margin-bottom: 5px; color: var(--ink); }
  .field .hint { font-weight: 400; color: var(--ink-soft); font-size: 0.78rem; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 11px 12px; border: 1.5px solid var(--line); border-radius: 8px;
    font-family: inherit; font-size: 0.95rem; background: var(--card); color: var(--ink); resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--sage); }
  .field textarea { min-height: 60px; }
  .field select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%), linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%); background-position: calc(100% - 18px) center, calc(100% - 13px) center; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 32px; }

  .section-divider { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--sage); font-weight: 700; margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  .section-divider:first-of-type { margin-top: 4px; }
